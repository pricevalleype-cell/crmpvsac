<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Ventas 3 Meses</title>

  <style>
    body { font-family: Arial, sans-serif; margin:20px; background:#f4f6f8; }
    h1 { margin-bottom:10px; }
    h2 { margin-top:0; }
    .box { background:#fff; padding:15px; margin-bottom:25px; border-radius:6px; }
    select, input { padding:6px; margin:10px 0; }
    table { border-collapse:collapse; width:100%; margin-top:10px; }
    th, td { border:1px solid #ccc; padding:6px; text-align:left; }
    th { background:#eee; }
    .status { font-weight:bold; margin:10px 0; }
  </style>
</head>

<body>

<h1>📊 Dashboard Ventas 3 Meses</h1>

<input type="file" id="fileInput" accept=".xlsx,.xls">
<div id="status" class="status"></div>

<!-- TABLA 1 -->
<div class="box">
  <h2>Tabla 1 – Producto x Distrito</h2>
  <label>Distrito:</label>
  <select id="filtroDistrito1"></select>
  <div id="tabla1"></div>
</div>

<!-- TABLA 2 -->
<div class="box">
  <h2>Tabla 2 – Cliente x Distrito</h2>
  <label>Distrito:</label>
  <select id="filtroDistrito2"></select>
  <div id="tabla2"></div>
</div>

<!-- TABLA 3 -->
<div class="box">
  <h2>Tabla 3 – Producto x Cliente (Monto)</h2>
  <label>Dirección Cliente:</label>
  <select id="filtroCliente3"></select>
  <div id="tabla3"></div>
</div>

<!-- TABLA 4 -->
<div class="box">
  <h2>Tabla 4 – Ventas x Cliente (Cantidad)</h2>
  <label>Dirección Cliente:</label>
  <select id="filtroCliente4"></select>
  <div id="tabla4"></div>
</div>

<script type="module">
import * as XLSX from "https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs";

let data = [];
const norm = t => t.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");

document.getElementById("fileInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;

  status.textContent = "⏳ Procesando archivo...";

  const reader = new FileReader();
  reader.onload = () => {
    const wb = XLSX.read(new Uint8Array(reader.result), { type:"array" });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval:"" });

    data = rows.map(r => {
      const o = {};
      Object.keys(r).forEach(k => o[norm(k)] = r[k]);
      return o;
    });

    status.textContent = `✅ Archivo cargado (${data.length} filas)`;
    cargarFiltros();
    recalcularTodo();
  };
  reader.readAsArrayBuffer(file);
});

function cargarFiltros() {
  llenar("filtroDistrito1", [...new Set(data.map(d=>d["DISTRITO"]).filter(Boolean))]);
  llenar("filtroDistrito2", [...new Set(data.map(d=>d["DISTRITO"]).filter(Boolean))]);
  llenar("filtroCliente3", [...new Set(data.map(d=>d["DIRECCION (CLIENTE)"]).filter(Boolean))]);
  llenar("filtroCliente4", [...new Set(data.map(d=>d["DIRECCION (CLIENTE)"]).filter(Boolean))]);

  filtroDistrito1.onchange = () => tabla1();
  filtroDistrito2.onchange = () => tabla2();
  filtroCliente3.onchange = () => tabla3();
  filtroCliente4.onchange = () => tabla4();
}

function llenar(id, vals) {
  const s = document.getElementById(id);
  s.innerHTML = "<option value=''>Todos</option>";
  vals.forEach(v => s.innerHTML += `<option>${v}</option>`);
}

function tabla1() {
  renderSimple(
    data.filter(r => !filtroDistrito1.value || r["DISTRITO"]===filtroDistrito1.value),
    "DESCRIPCION (ITEM)", "TOTAL (ITEM)", "tabla1"
  );
}

function tabla2() {
  renderMulti(
    data.filter(r => !filtroDistrito2.value || r["DISTRITO"]===filtroDistrito2.value),
    ["DIRECCION (CLIENTE)","NOMBRE (CLIENTE)"],
    "TOTAL (ITEM)", "tabla2"
  );
}

function tabla3() {
  renderSimple(
    data.filter(r => !filtroCliente3.value || r["DIRECCION (CLIENTE)"]===filtroCliente3.value),
    "DESCRIPCION (ITEM)", "TOTAL (ITEM)", "tabla3"
  );
}

function tabla4() {
  renderSimple(
    data.filter(r => !filtroCliente4.value || r["DIRECCION (CLIENTE)"]===filtroCliente4.value),
    "DESCRIPCION (ITEM)", "CANTIDAD (ITEM)", "tabla4"
  );
}

function recalcularTodo() {
  tabla1(); tabla2(); tabla3(); tabla4();
}

function renderSimple(rows, g, v, id) {
  const m = {};
  rows.forEach(r => {
    if(!r[g]) return;
    m[r[g]] = (m[r[g]]||0)+Number(r[v]||0);
  });
  let h = `<table><tr><th>${g}</th><th>${v}</th></tr>`;
  Object.entries(m).sort((a,b)=>b[1]-a[1])
    .forEach(([k,val]) => h+=`<tr><td>${k}</td><td>${val.toLocaleString()}</td></tr>`);
  document.getElementById(id).innerHTML = h+"</table>";
}

function renderMulti(rows, g, v, id) {
  const m = {};
  rows.forEach(r => {
    const k = g.map(x=>r[x]).join(" | ");
    m[k]=(m[k]||0)+Number(r[v]||0);
  });
  let h = `<table><tr><th>${g.join(" / ")}</th><th>${v}</th></tr>`;
  Object.entries(m).sort((a,b)=>b[1]-a[1])
    .forEach(([k,val]) => h+=`<tr><td>${k}</td><td>${val.toLocaleString()}</td></tr>`);
  document.getElementById(id).innerHTML = h+"</table>";
}
</script>

</body>
</html>
