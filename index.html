<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Ventas 3 Meses</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
/* ==== ESTILOS (SIN CAMBIOS FUNCIONALES) ==== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:#0f1117; --surface:#181c27; --surface2:#1e2335;
  --border:#2a2f45; --accent:#4f8ef7; --accent2:#7c5cfc;
  --green:#22c98e; --amber:#f5a623;
  --text:#e8eaf2; --muted:#6b7394;
  --gold:#f5c842; --silver:#a0aec0; --bronze:#c97d3a;
  --radius:12px;
  --font-disp:'Space Grotesk',sans-serif;
  --font-body:'Inter',sans-serif;
}

body { background:var(--bg); color:var(--text); font-family:var(--font-body); }

.topbar {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:14px 28px; display:flex; align-items:center; gap:16px;
  position:sticky; top:0; z-index:10;
}
.topbar-title { font-family:var(--font-disp); font-size:18px; font-weight:700; flex:1; }
.topbar-title span { color:var(--accent); }

.upload-btn-inner {
  background:var(--accent); color:#fff; padding:8px 16px;
  border-radius:8px; font-size:13px; font-weight:600; cursor:pointer;
}
.upload-btn input { display:none; }

.status-badge { font-size:12px; color:var(--muted); }
.status-badge.ok { color:var(--green); }
.status-badge.loading { color:var(--amber); }

.nav {
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; gap:4px; padding:0 28px;
}
.nav-tab {
  padding:12px 18px; border:none; background:none;
  color:var(--muted); cursor:pointer;
}
.nav-tab.active { color:var(--accent); border-bottom:2px solid var(--accent); }

.main { padding:28px; max-width:1200px; margin:auto; }
.panel { display:none; }
.panel.active { display:block; }

.card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:20px;
}

table { width:100%; border-collapse:collapse; font-size:13px; }
th, td { padding:10px 12px; border-bottom:1px solid var(--border); }
th { font-size:11px; text-transform:uppercase; color:var(--muted); }
.num { text-align:right; }

.empty { text-align:center; padding:40px; color:var(--muted); }
.rank-num { font-weight:700; text-align:center; width:32px; }
.rank-1{color:var(--gold);} .rank-2{color:var(--silver);}
.rank-3{color:var(--bronze);} .rank-n{color:var(--muted);}
</style>
</head>

<body>

<header class="topbar">
  <div class="topbar-title">📊 <span>Ventas</span> 3M</div>
  <div id="status" class="status-badge">Sin archivo cargado</div>
  <label class="upload-btn">
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="upload-btn-inner">⬆ Cargar Excel</div>
  </label>
</header>

<nav class="nav">
  <button class="nav-tab active" data-tab="t0">🏆 Resumen</button>
  <button class="nav-tab" data-tab="t1">📦 Producto × Distrito</button>
  <button class="nav-tab" data-tab="t2">👤 Cliente × Distrito</button>
</nav>

<main class="main">

<section class="panel active" id="t0">
  <div id="p0-content" class="empty">Carga el archivo Excel</div>
</section>

<section class="panel" id="t1">
  <select id="filtroDistrito1"></select>
  <div class="card" id="tabla1"></div>
</section>

<section class="panel" id="t2">
  <select id="filtroDistrito2"></select>
  <div class="card" id="tabla2"></div>
</section>

</main>

<script type="module">
import * as XLSX from "https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs";

let data = [];

const COLS = {
  DIRECCION_CLIENTE: "DIRECCION (CLIENTE)",
  NOMBRE_CLIENTE: "NOMBRE (CLIENTE)",
  DESCRIPCION_ITEM: "DESCRIPCION (ITEM)",
  TOTAL_ITEM: "TOTAL (ITEM)"
};

/* ========= FUNCIÓN CLAVE: EXTRAER DISTRITO ========= */
function extraerDistrito(direccion) {
  if (!direccion) return "";

  const txt = String(direccion).toUpperCase().trim();
  const sinLima = txt.replace(/\s+LIMA\s*-\s*LIMA\s*$/i, "").trim();

  const distritos = [
    "ANCON","ATE","BARRANCO","BREÑA","CARABAYLLO","CHACLACAYO",
    "CHORRILLOS","CIENEGUILLA","COMAS","EL AGUSTINO",
    "INDEPENDENCIA","JESUS MARIA","LA MOLINA","LA VICTORIA",
    "CERCADO DE LIMA","LINCE","LOS OLIVOS","LURIGANCHO",
    "LURIN","MAGDALENA DEL MAR","MIRAFLORES","PACHACAMAC",
    "PUCUSANA","PUEBLO LIBRE","PUENTE PIEDRA","RIMAC",
    "SAN BORJA","SAN ISIDRO","SAN JUAN DE LURIGANCHO",
    "SAN JUAN DE MIRAFLORES","SAN MARTIN DE PORRES",
    "SAN MIGUEL","SANTA ANITA","SANTIAGO DE SURCO",
    "SURQUILLO","VILLA EL SALVADOR","VILLA MARIA DEL TRIUNFO"
  ];

  for (const d of distritos) {
    if (sinLima.endsWith(" " + d) || sinLima === d) return d;
  }
  return "";
}

/* ========= EVENTOS ========= */
document.querySelectorAll(".nav-tab").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".nav-tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
    b.classList.add("active");
    document.getElementById(b.dataset.tab).classList.add("active");
  }
});

document.getElementById("fileInput").onchange = e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    const wb = XLSX.read(new Uint8Array(reader.result), { type:"array" });
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

    data = rows.map(r=>{
      const o = {};
      Object.entries(COLS).forEach(([k,v])=>o[k]=r[v]||"");
      o.DISTRITO = extraerDistrito(o.DIRECCION_CLIENTE);
      return o;
    });

    document.getElementById("status").textContent = `✅ ${data.length} filas`;
    cargarFiltros();
    resumen();
  };
  reader.readAsArrayBuffer(file);
};

function cargarFiltros() {
  const dists = [...new Set(data.map(d=>d.DISTRITO).filter(Boolean))].sort();
  ["filtroDistrito1","filtroDistrito2"].forEach(id=>{
    const s=document.getElementById(id);
    s.innerHTML='<option value="">Distrito</option>';
    dists.forEach(d=>s.innerHTML+=`<option>${d}</option>`);
  });
  filtroDistrito1.onchange=tabla1;
  filtroDistrito2.onchange=tabla2;
}

/* ========= TABLAS ========= */
function resumen(){
  const m={};
  data.forEach(r=>{
    m[r.DESCRIPCION_ITEM]=(m[r.DESCRIPCION_ITEM]||0)+Number(r.TOTAL_ITEM||0);
  });
  document.getElementById("p0-content").innerHTML = build(m,"Producto");
}

function tabla1(){
  const d=filtroDistrito1.value;
  const f=data.filter(r=>r.DISTRITO===d);
  const m={};
  f.forEach(r=>m[r.DESCRIPCION_ITEM]=(m[r.DESCRIPCION_ITEM]||0)+Number(r.TOTAL_ITEM||0));
  tabla1.innerHTML = build(m,"Producto");
}

function tabla2(){
  const d=filtroDistrito2.value;
  const f=data.filter(r=>r.DISTRITO===d);
  const m={};
  f.forEach(r=>{
    const k=r.NOMBRE_CLIENTE;
    m[k]=(m[k]||0)+Number(r.TOTAL_ITEM||0);
  });
  tabla2.innerHTML = build(m,"Cliente");
}

function build(map,label){
  const e=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if(!e.length) return '<div class="empty">Sin datos</div>';
  let h='<table><tr><th>Pos</th><th>'+label+'</th><th class="num">Total</th></tr>';
  e.forEach(([k,v],i)=>{
    h+=`<tr><td class="rank-num">${i+1}</td><td>${k}</td><td class="num">${v.toFixed(2)}</td></tr>`;
  });
  return h+'</table>';
}
</script>
</body>
</html>
``
