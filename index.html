<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard Ventas 3 Meses</title>

  <!-- SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.19.3/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f4f6f8;
    }

    h1 {
      margin-bottom: 10px;
    }

    .filters, .tabs {
      margin: 15px 0;
    }

    select, input {
      padding: 6px;
      margin-right: 10px;
    }

    button {
      padding: 8px 14px;
      cursor: pointer;
    }

    .tab-button {
      margin-right: 5px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: #fff;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 6px;
      text-align: left;
    }

    th {
      background: #eee;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<h1>📊 Dashboard Ventas 3 Meses</h1>

<input type="file" id="fileInput" accept=".xlsx,.csv" />

<div class="filters">
  <label>Distrito:</label>
  <select id="filtroDistrito"></select>

  <label>Dirección Cliente:</label>
  <select id="filtroDireccion"></select>
</div>

<div class="tabs">
  <button class="tab-button" onclick="showTab(1)">Producto x Distrito</button>
  <button class="tab-button" onclick="showTab(2)">Cliente x Distrito</button>
  <button class="tab-button" onclick="showTab(3)">Producto x Cliente (S/)</button>
  <button class="tab-button" onclick="showTab(4)">Ventas x Cliente (Cantidad)</button>
</div>

<div id="tab1"></div>
<div id="tab2" class="hidden"></div>
<div id="tab3" class="hidden"></div>
<div id="tab4" class="hidden"></div>

<script>
let data = [];

document.getElementById("fileInput").addEventListener("change", handleFile);

function handleFile(e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(evt) {
    const wb = XLSX.read(evt.target.result, { type: "binary" });
    const ws = wb.Sheets[wb.SheetNames[0]];
    data = XLSX.utils.sheet_to_json(ws);

    cargarFiltros();
    renderAll();
  };

  reader.readAsBinaryString(file);
}

function cargarFiltros() {
  const distritoSet = new Set(data.map(d => d["DISTRITO"]));
  const direccionSet = new Set(data.map(d => d["DIRECCIÓN (CLIENTE)"]));

  fillSelect("filtroDistrito", distritoSet);
  fillSelect("filtroDireccion", direccionSet);
}

function fillSelect(id, values) {
  const select = document.getElementById(id);
  select.innerHTML = "<option value=''>Todos</option>";
  values.forEach(v => {
    if (v) select.innerHTML += `<option>${v}</option>`;
  });
  select.onchange = renderAll;
}

function showTab(n) {
  [1,2,3,4].forEach(i =>
    document.getElementById("tab"+i).classList.add("hidden")
  );
  document.getElementById("tab"+n).classList.remove("hidden");
}

function renderAll() {
  const distrito = document.getElementById("filtroDistrito").value;
  const direccion = document.getElementById("filtroDireccion").value;

  renderTabla(
    filtrar(distrito, null),
    "DESCRIPCIÓN (ITEM)",
    "TOTAL (ITEM)",
    "tab1"
  );

  renderTabla(
    filtrar(distrito, null),
    ["DIRECCIÓN (CLIENTE)", "NOMBRE (CLIENTE)"],
    "TOTAL (ITEM)",
    "tab2"
  );

  renderTabla(
    filtrar(null, direccion),
    "DESCRIPCIÓN (ITEM)",
    "TOTAL (ITEM)",
    "tab3"
  );

  renderTabla(
    filtrar(null, direccion),
    "DESCRIPCIÓN (ITEM)",
    "CANTIDAD (ITEM)",
    "tab4"
  );
}

function filtrar(distrito, direccion) {
  return data.filter(d =>
    (!distrito || d["DISTRITO"] === distrito) &&
    (!direccion || d["DIRECCIÓN (CLIENTE)"] === direccion)
  );
}

function renderTabla(rows, groupBy, valueField, containerId) {
  const map = {};

  rows.forEach(r => {
    const key = Array.isArray(groupBy)
      ? groupBy.map(g => r[g]).join(" | ")
      : r[groupBy];

    map[key] = (map[key] || 0) + Number(r[valueField] || 0);
  });

  let html = "<table><tr><th>Detalle</th><th>Total</th></tr>";
  Object.entries(map)
    .sort((a,b) => b[1]-a[1])
    .forEach(([k,v]) => {
      html += `<tr><td>${k}</td><td>${v.toLocaleString()}</td></tr>`;
    });

  html += "</table>";
  document.getElementById(containerId).innerHTML = html;
}
</script>

</body>
</html>
