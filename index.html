<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Diagnóstico Excel</title>

  <!-- SheetJS correcto -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.19.3/dist/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .ok { color: green; }
    .error { color: red; }
    pre {
      background: #f4f4f4;
      padding: 10px;
      max-height: 300px;
      overflow: auto;
    }
  </style>
</head>
<body>

<h2>📂 Prueba de lectura de BDVENTAS3M.xlsx</h2>

<input type="file" id="fileInput" accept=".xlsx">

<div id="status"></div>
<pre id="output"></pre>

<script>
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  const status = document.getElementById("status");
  const output = document.getElementById("output");

  if (!file) return;

  status.innerHTML = "⏳ Leyendo archivo...";
  output.textContent = "";

  const reader = new FileReader();

  reader.onload = function(evt) {
    try {
      const data = new Uint8Array(evt.target.result);
      const workbook = XLSX.read(data, { type: "array" });

      status.innerHTML = `<span class="ok">✅ Archivo leído correctamente</span>`;

      const sheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[sheetName];

      const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });

      output.textContent =
        "HOJA: " + sheetName + "\n" +
        "FILAS LEÍDAS: " + rows.length + "\n\n" +
        "PRIMERA FILA:\n" +
        JSON.stringify(rows[0], null, 2);

    } catch (err) {
      status.innerHTML = `<span class="error">❌ Error leyendo el archivo</span>`;
      output.textContent = err.message;
    }
  };

  reader.onerror = function() {
    status.innerHTML = `<span class="error">❌ Error de FileReader</span>`;
  };

  reader.readAsArrayBuffer(file);
});
</script>

</body>
</html>
