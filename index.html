<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Ventas 3 Meses</title>
  <style>
    body { font-family: Arial, sans-serif; margin:20px; background:#f4f6f8; }
    h1 { margin-bottom:10px; }
    h2 { margin-top:0; }
    .box { background:#fff; padding:15px; margin-bottom:25px; border-radius:6px; }
    select, input { padding:6px; margin:10px 0; }
    table { border-collapse:collapse; width:100%; margin-top:10px; }
    th, td { border:1px solid #ccc; padding:6px; text-align:left; }
    th { background:#eee; }
    .status { font-weight:bold; margin:10px 0; }
    #debug { background:#fff3cd; padding:10px; border-radius:6px; margin-bottom:15px; font-size:12px; display:none; }
  </style>
</head>
<body>

<h1>📊 Dashboard Ventas 3 Meses</h1>

<input type="file" id="fileInput" accept=".xlsx,.xls">
<div id="status" class="status"></div>
<div id="debug"></div>

<!-- TABLA 1 -->
<div class="box">
  <h2>Tabla 1 – Producto x Distrito</h2>
  <label>Distrito:</label>
  <select id="filtroDistrito1"></select>
  <div id="tabla1"></div>
</div>

<!-- TABLA 2 -->
<div class="box">
  <h2>Tabla 2 – Cliente x Distrito</h2>
  <label>Distrito:</label>
  <select id="filtroDistrito2"></select>
  <div id="tabla2"></div>
</div>

<!-- TABLA 3 -->
<div class="box">
  <h2>Tabla 3 – Producto x Cliente (Monto)</h2>
  <label>Dirección Cliente:</label>
  <select id="filtroCliente3"></select>
  <div id="tabla3"></div>
</div>

<!-- TABLA 4 -->
<div class="box">
  <h2>Tabla 4 – Ventas x Cliente (Cantidad)</h2>
  <label>Dirección Cliente:</label>
  <select id="filtroCliente4"></select>
  <div id="tabla4"></div>
</div>

<script type="module">
import * as XLSX from "https://cdn.sheetjs.com/xlsx-0.20.3/package/xlsx.mjs";

let data = [];
let colMap = {}; // mapeo: clave normalizada -> nombre real en el archivo

const norm = t => String(t).toUpperCase().trim()
  .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
  .replace(/\s+/g, " ");

// Columnas que necesitamos (normalizadas)
const COLS = {
  DISTRITO:           "DISTRITO",
  DESCRIPCION_ITEM:   "DESCRIPCION (ITEM)",
  TOTAL_ITEM:         "TOTAL (ITEM)",
  CANTIDAD_ITEM:      "CANTIDAD (ITEM)",
  DIRECCION_CLIENTE:  "DIRECCION (CLIENTE)",
  NOMBRE_CLIENTE:     "NOMBRE (CLIENTE)"
};

document.getElementById("fileInput").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;

  document.getElementById("status").textContent = "⏳ Procesando archivo...";

  const reader = new FileReader();
  reader.onload = () => {
    const wb = XLSX.read(new Uint8Array(reader.result), { type: "array" });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });

    if (!rows.length) {
      document.getElementById("status").textContent = "❌ El archivo no tiene datos.";
      return;
    }

    // Detectar columnas reales del archivo y mapearlas
    const realKeys = Object.keys(rows[0]);
    colMap = {};
    realKeys.forEach(k => { colMap[norm(k)] = k; });

    // Mostrar debug con columnas detectadas
    const debugEl = document.getElementById("debug");
    debugEl.style.display = "block";
    debugEl.innerHTML = `<strong>Columnas detectadas:</strong><br>${realKeys.join(" | ")}`;

    // Normalizar datos usando los nombres reales detectados
    data = rows.map(r => {
      const o = {};
      Object.entries(COLS).forEach(([alias, expected]) => {
        const realKey = colMap[norm(expected)];
        o[alias] = realKey ? r[realKey] : "";
      });
      return o;
    });

    document.getElementById("status").textContent = `✅ Archivo cargado (${data.length} filas)`;
    cargarFiltros();
    recalcularTodo();
  };
  reader.readAsArrayBuffer(file);
});

function cargarFiltros() {
  llenar("filtroDistrito1", [...new Set(data.map(d => d.DISTRITO).filter(Boolean))].sort());
  llenar("filtroDistrito2", [...new Set(data.map(d => d.DISTRITO).filter(Boolean))].sort());
  llenar("filtroCliente3",  [...new Set(data.map(d => d.DIRECCION_CLIENTE).filter(Boolean))].sort());
  llenar("filtroCliente4",  [...new Set(data.map(d => d.DIRECCION_CLIENTE).filter(Boolean))].sort());

  document.getElementById("filtroDistrito1").onchange = tabla1;
  document.getElementById("filtroDistrito2").onchange = tabla2;
  document.getElementById("filtroCliente3").onchange  = tabla3;
  document.getElementById("filtroCliente4").onchange  = tabla4;
}

function llenar(id, vals) {
  const s = document.getElementById(id);
  s.innerHTML = "<option value=''>Todos</option>";
  vals.forEach(v => { s.innerHTML += `<option value="${v}">${v}</option>`; });
}

function tabla1() {
  const f = document.getElementById("filtroDistrito1").value;
  renderSimple(
    data.filter(r => !f || r.DISTRITO === f),
    "DESCRIPCION_ITEM", "TOTAL_ITEM",
    "Producto", "Total (S/)", "tabla1"
  );
}

function tabla2() {
  const f = document.getElementById("filtroDistrito2").value;
  renderMulti(
    data.filter(r => !f || r.DISTRITO === f),
    ["DIRECCION_CLIENTE", "NOMBRE_CLIENTE"],
    "TOTAL_ITEM",
    "Cliente", "Total (S/)", "tabla2"
  );
}

function tabla3() {
  const f = document.getElementById("filtroCliente3").value;
  renderSimple(
    data.filter(r => !f || r.DIRECCION_CLIENTE === f),
    "DESCRIPCION_ITEM", "TOTAL_ITEM",
    "Producto", "Total (S/)", "tabla3"
  );
}

function tabla4() {
  const f = document.getElementById("filtroCliente4").value;
  renderSimple(
    data.filter(r => !f || r.DIRECCION_CLIENTE === f),
    "DESCRIPCION_ITEM", "CANTIDAD_ITEM",
    "Producto", "Cantidad", "tabla4"
  );
}

function recalcularTodo() {
  tabla1(); tabla2(); tabla3(); tabla4();
}

function renderSimple(rows, g, v, labelG, labelV, id) {
  const m = {};
  rows.forEach(r => {
    const k = r[g];
    if (!k) return;
    m[k] = (m[k] || 0) + Number(r[v] || 0);
  });
  const entries = Object.entries(m).sort((a, b) => b[1] - a[1]);
  if (!entries.length) {
    document.getElementById(id).innerHTML = "<p>Sin datos para mostrar.</p>";
    return;
  }
  let h = `<table><tr><th>${labelG}</th><th>${labelV}</th></tr>`;
  entries.forEach(([k, val]) => {
    h += `<tr><td>${k}</td><td>${val.toLocaleString("es-PE", {minimumFractionDigits:2})}</td></tr>`;
  });
  document.getElementById(id).innerHTML = h + "</table>";
}

function renderMulti(rows, g, v, labelG, labelV, id) {
  const m = {};
  rows.forEach(r => {
    const k = g.map(x => r[x] || "").join(" | ");
    m[k] = (m[k] || 0) + Number(r[v] || 0);
  });
  const entries = Object.entries(m).sort((a, b) => b[1] - a[1]);
  if (!entries.length) {
    document.getElementById(id).innerHTML = "<p>Sin datos para mostrar.</p>";
    return;
  }
  let h = `<table><tr><th>${labelG}</th><th>${labelV}</th></tr>`;
  entries.forEach(([k, val]) => {
    h += `<tr><td>${k}</td><td>${val.toLocaleString("es-PE", {minimumFractionDigits:2})}</td></tr>`;
  });
  document.getElementById(id).innerHTML = h + "</table>";
}
</script>

</body>
</html>
